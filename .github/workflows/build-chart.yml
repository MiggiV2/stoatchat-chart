name: Build Helm Chart

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm dependency update
        run: helm dependency update charts/stoatchat

      - name: Helm lint
        run: helm lint charts/stoatchat

      - name: Helm template
        run: helm template stoatchat charts/stoatchat > /tmp/stoatchat-rendered.yaml

      - name: Helm package
        run: |
          mkdir -p dist
          helm package charts/stoatchat --destination dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: stoatchat-chart
          path: dist/*.tgz

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI registry
        if: github.event_name == 'push'
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          helm push dist/*.tgz "oci://ghcr.io/${OWNER_LC}/charts"
