{{- if and .Values.components.livekit.enabled (not .Values.config.existingLivekitConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stoatchat.livekitConfigMapName" . }}
  labels:
    {{- include "stoatchat.labels" . | nindent 4 }}
data:
  livekit.yml: |
{{ tpl .Values.config.livekitYaml . | indent 4 }}
{{- end }}
