{{- $components := (include "stoatchat.components" .) | fromYamlArray }}
{{- range $component := $components }}
{{- $cfg := index $.Values.components $component.id }}
{{- if and $cfg $cfg.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stoatchat.fullname" $ }}-{{ $component.name }}
  labels:
    {{- include "stoatchat.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component.name }}
spec:
  replicas: {{ default 1 $cfg.replicaCount }}
  selector:
    matchLabels:
      {{- include "stoatchat.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $component.name }}
  template:
    metadata:
      labels:
        {{- include "stoatchat.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $component.name }}
    spec:
      serviceAccountName: {{ include "stoatchat.serviceAccountName" $ }}
      {{- with $cfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $component.name }}
          image: {{ $cfg.image | quote }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          {{- if eq $component.id "livekit" }}
          args: ["--config", "/etc/livekit.yml"]
          {{- end }}
          ports:
            - name: http
              containerPort: {{ default $component.port $cfg.port }}
              protocol: TCP
          {{- if $component.useWebEnv }}
          envFrom:
            - configMapRef:
                name: {{ include "stoatchat.fullname" $ }}-web-env
          {{- else }}
          envFrom:
            - secretRef:
                name: {{ include "stoatchat.secretName" $ }}
          {{- end }}
          {{- with $cfg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $component.mountRevolt $component.mountLivekit }}
          volumeMounts:
            {{- if $component.mountRevolt }}
            - name: revolt-config
              mountPath: /Revolt.toml
              subPath: Revolt.toml
            {{- end }}
            {{- if $component.mountLivekit }}
            - name: livekit-config
              mountPath: /etc/livekit.yml
              subPath: livekit.yml
            {{- end }}
          {{- end }}
      {{- if or $component.mountRevolt $component.mountLivekit }}
      volumes:
        {{- if $component.mountRevolt }}
        - name: revolt-config
          configMap:
            name: {{ include "stoatchat.revoltConfigMapName" $ }}
        {{- end }}
        {{- if $component.mountLivekit }}
        - name: livekit-config
          configMap:
            name: {{ include "stoatchat.livekitConfigMapName" $ }}
        {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}
