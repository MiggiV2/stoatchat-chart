apiVersion: v2
name: stoatchat
description: Custom Helm chart for deploying Stoatchat self-hosted services
type: application
version: 0.1.1
appVersion: "0.12.0"

dependencies:
  - name: mongodb
    version: "19.0.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: infrastructure.mongodb.enabled
  - name: redis
    version: "25.5.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: infrastructure.redis.enabled
  - name: rabbitmq
    version: "16.0.14"
    repository: "https://charts.bitnami.com/bitnami"
    condition: infrastructure.rabbitmq.enabled
  - name: minio
    version: "17.0.21"
    repository: "https://charts.bitnami.com/bitnami"
    condition: infrastructure.minio.enabled
