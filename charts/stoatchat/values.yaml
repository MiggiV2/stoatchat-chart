nameOverride: ""
fullnameOverride: ""

global:
  domain: chat.example.com
  imagePullPolicy: IfNotPresent

ingress:
  enabled: true
  className: ""
  annotations: {}
  # Emit a Traefik middleware reference annotation on the Ingress when enabled.
  # `middlewareName` must be the fully qualified middleware ref Traefik expects,
  # e.g. "stoatchat-strip-api@kubernetescrd". The middleware itself must be
  # created out of band (e.g. a Traefik Middleware CR).
  stripApiPrefix:
    enabled: false
    middlewareName: ""
  tls:
    enabled: false
    secretName: ""
  host: ""

serviceAccount:
  create: true
  name: ""

infrastructure:
  mongodb:
    enabled: false
    uri: "mongodb://database:27017/revolt"
  redis:
    enabled: false
    address: "redis:6379"
  rabbitmq:
    enabled: false
    address: "amqp://rabbituser:rabbitpass@rabbit:5672"
  rustfs:
    enabled: true
    endpoint: "http://rustfs:9000"
    bucket: "revolt-uploads"
    accessKey: "rustfsautumn"
    secretKey: "rustfsautumn"
    # Post-install/post-upgrade Helm hook Job that ensures `bucket` exists on
    # `endpoint`. Idempotent (`mc mb --ignore-existing`). Disable if the
    # bucket is managed out of band.
    bucketInit:
      enabled: true
      image:
        repository: minio/mc
        tag: latest
        pullPolicy: ""
      backoffLimit: 6
      activeDeadlineSeconds: 300
      resources: {}

# RabbitMQ subchart (groundhog2k/rabbitmq) uses the upstream
# docker.io/rabbitmq image. erlangCookie is MANDATORY when enabling
# the bundled chart; user/password must match
# `infrastructure.rabbitmq.address`.
rabbitmq:
  authentication:
    user:
      value: "rabbituser"
    password:
      value: "rabbitpass"
    erlangCookie:
      value: "replace-me"

# Valkey subchart (groundhog2k/valkey) uses the upstream
# docker.io/valkey/valkey image and runs without auth by default.
# Set `valkey.fullnameOverride: redis` (or override
# `infrastructure.redis.address`) so the in-cluster service name matches
# what the apps and LiveKit connect to.
valkey: {}

# RustFS subchart defaults: single-pod standalone with one PVC.
# Override `secret.rustfs.*` (or set `secret.existingSecret`) when enabling.
rustfs:
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  replicaCount: 1
  secret:
    rustfs:
      access_key: "rustfsautumn"
      secret_key: "rustfsautumn"
  ingress:
    enabled: false
  storageclass:
    name: local-path
    dataStorageSize: 8Gi
    logStorageSize: 256Mi
  affinity:
    podAntiAffinity:
      enabled: false

existingSecretsName: ""

# SMTP credentials for email verification. The non-sensitive settings
# (host/port/from_address/use_tls) live in Revolt.toml under [api.smtp];
# only the username/password are pulled from an out-of-band Secret and
# injected into the api pod as REVOLT__API__SMTP__{USERNAME,PASSWORD}.
smtp:
  enabled: false
  existingSecret: ""      # Secret holding SMTP creds (e.g. stoatchat-smtp)
  usernameKey: username
  passwordKey: password

# hCaptcha anti-bot for signup/login. Credentials come from an out-of-band
# Secret and are injected into the api pod as
# REVOLT__API__SECURITY__CAPTCHA__HCAPTCHA_{KEY,SITEKEY}.
# The secret verification key is always injected; the public sitekey is injected
# only when `sitekeyKey` is set (otherwise put hcaptcha_sitekey in Revolt.toml).
captcha:
  enabled: false
  existingSecret: ""       # Secret holding the hCaptcha credentials
  secretKey: hcaptcha_key  # data key in the Secret: hCaptcha secret (verification) key
  sitekeyKey: ""           # data key in the Secret: public sitekey (optional)

secrets:
  REVOLT__PUSHD__VAPID__PRIVATE_KEY: "replace-me"
  REVOLT__PUSHD__VAPID__PUBLIC_KEY: "replace-me"
  REVOLT__FILES__ENCRYPTION_KEY: "replace-me"
  REVOLT__API__LIVEKIT__NODES__WORLDWIDE__KEY: "replace-me"
  REVOLT__API__LIVEKIT__NODES__WORLDWIDE__SECRET: "replace-me"

config:
  existingRevoltTomlConfigMap: ""
  existingLivekitConfigMap: ""
  webEnv:
    VITE_CFG_ENABLE_VIDEO: "false"
  revoltToml: |
    [hosts]
    app = "https://{{ .Values.global.domain }}"
    api = "https://{{ .Values.global.domain }}/api"
    events = "wss://{{ .Values.global.domain }}/ws"
    autumn = "https://{{ .Values.global.domain }}/autumn"
    january = "https://{{ .Values.global.domain }}/january"
    gifbox = "https://{{ .Values.global.domain }}/gifbox"

    [hosts.livekit]
    worldwide = "wss://{{ .Values.global.domain }}/livekit"

    [api.livekit.nodes.worldwide]
    url = "http://{{ include "stoatchat.fullname" . }}-livekit:7880"
    lat = 0.0
    lon = 0.0
  livekitYaml: |
    rtc:
      use_external_ip: true
      port_range_start: 50000
      port_range_end: 50100
      tcp_port: 7881

    redis:
      address: {{ .Values.infrastructure.redis.address | quote }}

    turn:
      enabled: false

    keys:
      {{ .Values.secrets.REVOLT__API__LIVEKIT__NODES__WORLDWIDE__KEY }}: {{ .Values.secrets.REVOLT__API__LIVEKIT__NODES__WORLDWIDE__SECRET }}

    webhook:
      api_key: {{ .Values.secrets.REVOLT__API__LIVEKIT__NODES__WORLDWIDE__KEY }}
      urls:
      - 'http://{{ include "stoatchat.fullname" . }}-voice-ingress:8500/worldwide'

# Every entry under `components:` accepts the following optional fields
# in addition to the ones shown explicitly below. Defaults are empty/unset
# so omitting them keeps existing behaviour:
#   resources: {}           # pod resource requests/limits
#   livenessProbe: {}       # full probe spec, passed through verbatim
#   readinessProbe: {}      # full probe spec, passed through verbatim
#   startupProbe: {}        # full probe spec, passed through verbatim
#   nodeSelector: {}
#   tolerations: []
#   affinity: {}
components:
  api:
    enabled: true
    image: ghcr.io/stoatchat/api:v0.13.9
    replicaCount: 1
    port: 14702
  events:
    enabled: true
    image: ghcr.io/stoatchat/events:v0.13.9
    replicaCount: 1
    port: 14703
  autumn:
    enabled: true
    image: ghcr.io/stoatchat/file-server:v0.13.9
    replicaCount: 1
    port: 14704
  january:
    enabled: true
    image: ghcr.io/stoatchat/proxy:v0.13.9
    replicaCount: 1
    port: 14705
  gifbox:
    enabled: true
    image: ghcr.io/stoatchat/gifbox:v0.13.9
    replicaCount: 1
    port: 14706
  crond:
    enabled: true
    image: ghcr.io/stoatchat/crond:v0.13.9
    replicaCount: 1
    port: 14707
  pushd:
    enabled: true
    image: ghcr.io/stoatchat/pushd:v0.13.9
    replicaCount: 1
    port: 14708
  voiceIngress:
    enabled: false
    image: ghcr.io/stoatchat/voice-ingress:v0.13.9
    replicaCount: 1
    port: 8500
  livekit:
    enabled: false
    image: ghcr.io/stoatchat/livekit-server:v1.9.13
    replicaCount: 1
    port: 7880
    nodeSelector: {}
    tolerations: []
    affinity: {}
    mediaService:
      enabled: false
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations: {}
      labels: {}
      serviceLbPool: ""
      rtcTcpPort: 7881
      rtcUdpPortRangeStart: 50000
      rtcUdpPortRangeEnd: 50100
      includeTurnPorts: false
      turnUdpPort: 3478
      turnTlsPort: 5349
  web:
    enabled: true
    image: ghcr.io/stoatchat/for-web:4414eac # v0.10.0
    replicaCount: 1
    port: 5000
